<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Service Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #4e4e4e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; background: rgb(33, 32, 32); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        #chat-header { background: #cb692b; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-box { height: 400px; padding: 15px; overflow-y: auto; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 80%; }
        .user-msg { background: #cb692b; color: white; align-self: flex-end; }
        .bot-msg { background: #e9ecef; color: #333; align-self: flex-start; }
        #input-area { display: flex; padding: 10px; gap: 5px; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        #send-btn { background: #cb692b; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        #send-btn:hover { background: #cb692b; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Car Service Assistant</div>
    <div id="chat-box">
        <div class="message bot-msg">Hello! How can I help with your car today?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your service request..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = inputField.value.trim();

        if (!message) return;

        // 1. Add User message to UI
        chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 2. Send to Django Backend
            const response = await fetch('/chat-api/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken') // Required for Django POST requests
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();

            // 3. Add Bot response to UI
            chatBox.innerHTML += `<div class="message bot-msg">${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            console.error("Error:", error);
        }
    }

    // Function to get CSRF token from cookies
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

</body>
</html>
